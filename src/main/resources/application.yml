spring:
  application:
    name: bing-ai-code-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bing_ai_code
    username: root
    password: 123456
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    group: 'default'
    path-to-match: '/**'
    packages-to-scan: com.example.bingaicode.controller

knife4j:
  enable:
  controller:
    language: zh_cn
